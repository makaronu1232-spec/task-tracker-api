---
- name: Install Nginx
  ansible.builtin.apt:
    name:
      - nginx
      - certbot
      - python3-certbot-nginx
    state: present

- name: Remove default Nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload Nginx

- name: Copy Nginx site config
  ansible.builtin.template:
    src: task-tracker.conf.j2
    dest: /etc/nginx/sites-available/task-tracker.conf
    mode: "0644"
  notify: Reload Nginx

- name: Enable Nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/task-tracker.conf
    dest: /etc/nginx/sites-enabled/task-tracker.conf
    state: link
  notify: Reload Nginx

- name: Validate Nginx config
  ansible.builtin.command: nginx -t
  changed_when: false

- name: Enable and start Nginx
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
