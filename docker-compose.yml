services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taskapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskapi}
      POSTGRES_DB: ${POSTGRES_DB:-taskapi}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskapi}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  api:
    build: .
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      POSTGRES_USER: ${POSTGRES_USER:-taskapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskapi}
      POSTGRES_DB: ${POSTGRES_DB:-taskapi}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
